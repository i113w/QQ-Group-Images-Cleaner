# 工作流的名称
name: Build and Release EXE

# 触发工作流的事件
on:
  push:
    tags:
      - 'i113w-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # bump version to 3.12

      # 修改2：从专属 tag 中提取版本号
      # tag 形如: i113w-v1.1.3  ->  version = 1.1.3
      # tag 形如: i113w-v1.1.3-i113w.1  ->  version = 1.1.3-i113w.1
      - name: Extract version from tag and update version.txt
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#i113w-v}"
          echo "Tag:     $TAG_NAME"
          echo "Version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "ERROR: Failed to extract version from tag '$TAG_NAME'"
            exit 1
          fi
          python scripts/update_version.py "$VERSION" version.txt
          echo "----- version.txt after update -----"
          cat version.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      # 修改3：打包时给 exe 加上专属命名，避免和原作者重名
      - name: Build executable with PyInstaller
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --windowed
          --name "QQ-Group-Images-Cleaner-i113w"
          --version-file version.txt
          qq_group_images_cleaner.py
      
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          # 修改4：上传的文件名也要对应修改
          files: dist/QQ-Group-Images-Cleaner-i113w.exe